  <body>
    <div id="root"></div>
    <script>
      (function () {
        var STORAGE_KEY = "paite-server-build";
        var RELOAD_KEY = "paite-reload-once";

        function bustReload() {
          if (sessionStorage.getItem(RELOAD_KEY)) return;
          sessionStorage.setItem(RELOAD_KEY, "1");
          var url = new URL(window.location.href);
          url.searchParams.set("_cb", String(Date.now()));
          window.location.replace(url.toString());
        }

        fetch("/api/version", { cache: "no-store" })
          .then(function (res) {
            return res.json();
          })
          .then(function (data) {
            var serverBuild = data && data.build;
            if (!serverBuild) return;
            var storedBuild = localStorage.getItem(STORAGE_KEY);
            if (storedBuild && storedBuild !== serverBuild) {
              localStorage.setItem(STORAGE_KEY, serverBuild);
              bustReload();
              return;
            }
            localStorage.setItem(STORAGE_KEY, serverBuild);
            sessionStorage.removeItem(RELOAD_KEY);
          })
          .catch(function () {});

        window.addEventListener(
          "error",
          function (event) {
            var target = event.target;
            if (target && target.tagName === "SCRIPT") {
              bustReload();
            }
          },
          true,
        );
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
