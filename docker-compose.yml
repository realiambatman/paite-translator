services:
  paite-translator:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - STATIC_DIR=/app/static
      - PORT=8000
    volumes:
      - hf-cache:/root/.cache/huggingface
    restart: unless-stopped
    # Uncomment for NVIDIA GPU (4-bit quantization)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  hf-cache:
